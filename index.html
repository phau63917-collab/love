<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Birthday Gift - Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Nút bấm ở giữa màn hình */
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20; padding: 12px 25px; background: transparent;
            color: white; border: 2px solid white; cursor: pointer;
            font-size: 18px; border-radius: 5px; transition: 0.3s;
        }
        #start-btn:hover { background: white; color: black; }

        #text-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; text-align: center; pointer-events: none; display: none;
        }
        .wish { 
            color: #ff4d6d; font-size: 35px; font-weight: bold; 
            text-shadow: 0 0 20px #ff0000; white-space: nowrap;
        }
        .bee { position: absolute; font-size: 25px; z-index: 15; transition: all 2.5s ease-in-out; }
    </style>
</head>
<body>
    <button id="start-btn">คลิกที่นี่</button>

    <div id="text-container">
        <div class="wish">สุขสันต์วันเกิดนะที่รัก</div>
    </div>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const textContainer = document.getElementById('text-container');
        
        let hearts = []; 
        let isStarted = false;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', init);
        init();

        const emojis = ['❄️', '💝', '💘', '💖', '💗', '💓', '💞', '💕', '❣️', '❤️‍🔥', '❤️'];

        function createFallingHeart() {
            if(!isStarted) return;
            hearts.push({
                x: Math.random() * canvas.width,
                y: -50,
                txt: emojis[Math.floor(Math.random() * emojis.length)],
                size: Math.random() * 20 + 15,
                speed: Math.random() * 3 + 2, // Tăng tốc độ rơi
                wind: Math.sin(Math.random()) * 2
            });
        }

        // Khi bấm vào nút
        startBtn.onclick = () => {
            isStarted = true;
            startBtn.style.display = 'none'; // Ẩn nút
            textContainer.style.display = 'block'; // Hiện chữ chúc mừng
            
            // Tạo đàn ong
            for(let i=0; i<12; i++) {
                const bee = document.createElement('div');
                bee.className = 'bee'; bee.innerHTML = '🐝';
                document.body.appendChild(bee);
                const moveBee = () => {
                    bee.style.left = Math.random() * 90 + 'vw';
                    bee.style.top = Math.random() * 90 + 'vh';
                    setTimeout(moveBee, Math.random() * 2000 + 1500);
                };
                moveBee();
            }
            
            setInterval(createFallingHeart, 100);
            animate();
        };

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            hearts.forEach((h, index) => {
                h.y += h.speed;
                h.x += h.wind;
                ctx.font = h.size + "px Arial";
                ctx.fillText(h.txt, h.x, h.y);
                
                if (h.y > canvas.height) hearts.splice(index, 1);
            });

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
