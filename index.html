<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday - Final Heart</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }

        /* Nền sao nhấp nháy */
        #star-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Nút bấm ban đầu */
        #start-btn {
            z-index: 10;
            padding: 15px 40px;
            font-size: 20px;
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
            transition: 0.3s;
        }
        #start-btn:hover { background: #fff; color: #000; }

        /* Bì thư đen */
        #envelope-wrapper {
            display: none;
            z-index: 5;
            transition: all 1s ease;
        }
        .envelope {
            width: 250px;
            height: 150px;
            background: #1a1a1a;
            position: relative;
            border: 1px solid #333;
        }
        .envelope::after {
            content: "";
            position: absolute;
            top: 0;
            border-top: 80px solid #252525;
            border-left: 125px solid transparent;
            border-right: 125px solid transparent;
        }
        .fade-out { opacity: 0; transform: scale(0); }

        /* Canvas Trái tim hạt mịn */
        #heart-canvas {
            display: none;
            position: absolute;
            z-index: 2;
        }

        /* Chữ Thái giữa tim */
        .thai-text {
            position: absolute;
            z-index: 3;
            color: #ff4d6d;
            font-size: 35px;
            font-weight: bold;
            display: none;
            text-shadow: 0 0 15px #ff4d6d;
            pointer-events: none;
            text-align: center;
        }

        /* Ong bay */
        .bee {
            position: absolute;
            font-size: 25px;
            z-index: 4;
            pointer-events: none;
            transition: all 3s ease-in-out;
        }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>
    <button id="start-btn">คลิกที่นี่</button>

    <div id="envelope-wrapper">
        <div class="envelope"></div>
    </div>

    <canvas id="heart-canvas"></canvas>
    <div id="thai-msg" class="thai-text">สุขสันต์วันเกิดนะที่รัก</div>

    <script>
        const btn = document.getElementById('start-btn');
        const env = document.getElementById('envelope-wrapper');
        const heartCanvas = document.getElementById('heart-canvas');
        const msg = document.getElementById('thai-msg');

        // 1. Khởi tạo nền sao
        const starCtx = document.getElementById('star-canvas').getContext('2d');
        let stars = [];
        function initStars() {
            starCtx.canvas.width = window.innerWidth;
            starCtx.canvas.height = window.innerHeight;
            for(let i=0; i<200; i++) {
                stars.push({x: Math.random()*innerWidth, y: Math.random()*innerHeight, r: Math.random()*1.5});
            }
        }
        function drawStars() {
            starCtx.clearRect(0,0,innerWidth,innerHeight);
            starCtx.fillStyle = "white";
            stars.forEach(s => {
                starCtx.beginPath();
                starCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                starCtx.fill();
            });
            requestAnimationFrame(drawStars);
        }
        initStars(); drawStars();

        // 2. Xử lý bấm nút mở thư
        btn.onclick = () => {
            btn.style.display = 'none';
            env.style.display = 'block';
            setTimeout(() => {
                env.classList.add('fade-out');
                setTimeout(() => {
                    env.style.display = 'none';
                    showHeart();
                }, 1000);
            }, 1000);
        };

        // 3. Hiệu ứng Trái tim Hạt mịn
        function showHeart() {
            heartCanvas.style.display = 'block';
            msg.style.display = 'block';
            const ctx = heartCanvas.getContext('2d');
            heartCanvas.width = window.innerWidth;
            heartCanvas.height = window.innerHeight;

            let particles = [];
            const particleCount = 1500;

            function getHeartPoint(t) {
                return {
                    x: 16 * Math.pow(Math.sin(t), 3),
                    y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
                };
            }

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.t = Math.random() * Math.PI * 2;
                    const point = getHeartPoint(this.t);
                    this.x = heartCanvas.width / 2;
                    this.y = heartCanvas.height / 2;
                    // Độ lớn của trái tim (15)
                    this.targetX = heartCanvas.width / 2 + point.x * 15;
                    this.targetY = heartCanvas.height / 2 + point.y * 15;
                    this.speed = Math.random() * 0.04 + 0.01;
                    this.size = Math.random() * 2 + 1;
                }
                update() {
                    this.x += (this.targetX - this.x) * this.speed;
                    this.y += (this.targetY - this.y) * this.speed;
                    // Khi hạt chạm mục tiêu thì reset để tạo hiệu ứng luân chuyển
                    if (Math.abs(this.x - this.targetX) < 1) this.reset();
                }
                draw() {
                    ctx.fillStyle = "#ff3366";
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < particleCount; i++) particles.push(new Particle());

            function animateHeart() {
                // Tạo hiệu ứng đuôi mờ cho hạt
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, heartCanvas.width, heartCanvas.height);
                
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });

                // Giữ chữ ở giữa
                msg.style.left = (window.innerWidth/2 - msg.offsetWidth/2) + 'px';
                msg.style.top = (window.innerHeight/2 - msg.offsetHeight/2) + 'px';
                
                requestAnimationFrame(animateHeart);
            }
            animateHeart();
            startBees();
        }

        // 4. Tạo ong bay xung quanh
        function startBees() {
            for (let i = 0; i < 5; i++) {
                const bee = document.createElement('div');
                bee.className = 'bee';
                bee.innerHTML = '🐝';
                document.body.appendChild(bee);
                animateBee(bee);
            }
        }

        function animateBee(bee) {
            let x = Math.random() * window.innerWidth;
            let y = Math.random() * window.innerHeight;
            bee.style.left = x + 'px';
            bee.style.top = y + 'px';
            setTimeout(() => animateBee(bee), 3000);
        }

        window.addEventListener('resize', () => {
            initStars();
            heartCanvas.width = window.innerWidth;
            heartCanvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
