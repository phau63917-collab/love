<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật - Heart & Snow</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0a0a0a; /* Nền đen */
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* Hiệu ứng sao trắng lung linh trên nền đen */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Nút bấm ban đầu */
        #start-btn {
            z-index: 10;
            padding: 15px 40px;
            font-size: 22px;
            background: #000;
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        #start-btn:hover {
            background: white;
            color: black;
        }

        /* Container Trái Tim và Hiệu Ứng */
        .heart-container {
            display: none;
            position: absolute;
            width: 600px;
            height: 600px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .heart-active {
            display: block;
            opacity: 1;
        }

        /* Chữ tiếng Thái ở giữa */
        .thai-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 40px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff4d6d, 0 0 30px #ff4d6d;
            z-index: 20;
            white-space: nowrap;
        }

        /* Hiệu ứng co giãn nhẹ (heartbeat) cho trái tim */
        .heart-active .thai-text {
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: translate(-50%, -50%) scale(1); }
            15% { transform: translate(-50%, -50%) scale(1.05); }
            30% { transform: translate(-50%, -50%) scale(1); }
        }

        /* Bông tuyết rơi */
        .snowflake {
            position: absolute;
            color: white;
            font-size: 1.5rem;
            opacity: 0.7;
            pointer-events: none;
            animation: fall linear forwards;
        }

        /* Trái tim nhỏ rơi */
        .falling-heart {
            position: absolute;
            font-size: 1rem;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* Các con ong bay */
        .bee {
            position: absolute;
            font-size: 25px;
            z-index: 25;
            transition: 0.5s;
        }
    </style>
</head>
<body>

    <div class="stars" id="star-field"></div>

    <button id="start-btn" onclick="openMessage()">คลิกที่นี่</button>

    <div class="heart-container" id="heart-box">
        <div class="thai-text">สุขสันต์วันเกิด</div>
        <div class="bee">🐝</div>
        <div class="bee">🐝</div>
        <div class="bee">🐝</div>
        <div class="bee">🐝</div>
        <div class="bee">🐝</div>
    </div>

    <script>
        // Tạo sao nền
        const starField = document.getElementById('star-field');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starField.appendChild(starField.appendChild(star);
        }

        function openMessage() {
            document.getElementById('start-btn').style.display = 'none';
            const heart = document.getElementById('heart-box');
            heart.classList.add('heart-active');
            startEffects();
        }

        function startEffects() {
            // Tạo bông tuyết rơi liên tục
            setInterval(createSnowflake, 100);
            // Tạo trái tim nhỏ rơi liên tục
            setInterval(createFallingHeart, 200);
            // Tạo con ong
            const bees = document.querySelectorAll('.bee');
            bees.forEach(bee => moveBee(bee));
        }

        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            snowflake.innerHTML = '❄️';
            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.top = '-20px';
            snowflake.style.animationDuration = (Math.random() * 3 + 2) + 's';
            snowflake.style.opacity = Math.random();
            document.body.appendChild(snowflake);
            setTimeout(() => snowflake.remove(), 5000);
        }

        function createFallingHeart() {
            const hearts = ['💝', '💘', '💖', '💗', '💓', '💞', '💕', '❣️', '❤️‍🔥', '❤️'];
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px';
            heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        function moveBee(bee) {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            bee.style.left = x + 'px';
            bee.style.top = y + 'px';
            setTimeout(() => moveBee(bee), Math.random() * 2000 + 1000);
        }
    </script>
</body>
</html>
